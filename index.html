<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Персонажи — Меню</title>

  <!-- Подключаем шрифты Google Fonts (единственная внешняя зависимость) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS-переменные — меняй цвета здесь, и всё обновится сразу
       ============================================================ */
    :root {
      --bg:        #fdf6ee;
      --card-bg:   #ffffff;
      --accent:    #c0392b;
      --accent2:   #e67e22;
      --text:      #2c2c2c;
      --muted:     #888;
      --border:    #e8ddd0;
      --vegan:     #27ae60;
      --radius:    14px;
      --shadow:    0 4px 18px rgba(0,0,0,0.08);
    }

    /* ============================================================
       Общий сброс и базовые стили
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       Шапка
       ============================================================ */
    header {
      background: var(--accent);
      color: #fff;
      padding: 24px 20px 20px;
      text-align: center;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
    }
    header p {
      margin-top: 6px;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    /* ============================================================
       Панель поиска и фильтров
       ============================================================ */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 0 16px;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 1rem;
      padding: 10px 0;
      background: transparent;
      color: var(--text);
    }
    .search-box .icon { color: var(--muted); font-size: 1.1rem; }

    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }

    .cat-btn {
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .cat-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .cat-btn:hover:not(.active) {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .results-info {
      padding: 10px 20px 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ============================================================
       Сетка карточек блюд
       ============================================================ */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      padding: 16px 20px 40px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s;
      animation: fadeIn 0.3s ease both;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      width: 100%;
      height: 180px;
      background: #f0e8df;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      flex-shrink: 0;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.35;
      flex: 1;
    }

    .badge-vegan {
      background: var(--vegan);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 2px;
    }

    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.45;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .card-weight {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .card-price {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .card-cat {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent2);
      background: #fef3e2;
      border-radius: 6px;
      padding: 2px 8px;
      align-self: flex-start;
    }

    .vegan-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      align-self: flex-start;
    }
    .vegan-toggle input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--vegan);
      cursor: pointer;
    }
    .vegan-toggle-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--vegan);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state .emoji { font-size: 3rem; }
    .empty-state p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Персонажи</h1>
  <p>Кухня родом из Грузии · Волгоград</p>
</header>

<div class="controls">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск блюда..." oninput="applyFilters()" />
  </div>
  <div class="categories" id="categoryButtons"></div>
  <label class="vegan-toggle">
    <input type="checkbox" id="veganOnly" onchange="applyFilters()" />
    <span class="vegan-toggle-label">🌿 Только веган</span>
  </label>
</div>

<div class="results-info" id="resultsInfo"></div>

<main class="menu-grid" id="menuGrid"></main>

<script>
  const dishes = [
    { id: 1, name: "Хачапури по-аджарски", category: "Выпечка", price: 670, weight: "380 гр", isVegan: false, emoji: "🥚", desc: "Лодочка из теста с расплавленным сыром и яйцом. Символ Аджарии!" },
    { id: 2, name: "Хачапури по-мегрельски", category: "Выпечка", price: 650, weight: "500 гр", isVegan: false, emoji: "🧀", desc: "Сыр снаружи и внутри — настоящее сырное удовольствие" },
    { id: 3, name: "Хачапури с томатами", category: "Выпечка", price: 690, weight: "430 гр", isVegan: false, emoji: "🍅", desc: "С томатами, базиликом и соусом Песто" },
    { id: 4, name: "Хлеб Шоти", category: "Выпечка", price: 85, weight: "280 гр", isVegan: true, emoji: "🍞", desc: "Традиционный грузинский хлеб из тандыра" },
    { id: 5, name: "Хинкали со свининой и говядиной", category: "Хинкали", price: 125, weight: "1 шт", isVegan: false, emoji: "🥟", desc: "Свинина, говядина и кинза — классический выбор" },
    { id: 6, name: "Хинкали с бараниной", category: "Хинкали", price: 145, weight: "1 шт", isVegan: false, emoji: "🥟", desc: "Ароматная баранина с кинзой" },
    { id: 7, name: "Хинкали картофель и лук", category: "Хинкали", price: 125, weight: "1 шт", isVegan: true, emoji: "🥟", desc: "Простая и вкусная начинка из картофеля с луком" },
    { id: 8, name: "Царь-хинкали", category: "Хинкали", price: 490, weight: "590 гр", isVegan: false, emoji: "👑", desc: "Легендарные огромные хинкали — свинина+говядина, говядина+тархун или курица+грибы+сыр на выбор" },
    { id: 9, name: "Жареный Сулугуни", category: "Закуски", price: 440, weight: "120/40 гр", isVegan: false, emoji: "🧀", desc: "Золотистая корочка снаружи, тянущийся сыр внутри — с клюквенным ткемали" },
    { id: 10, name: "Бадриджани с грецким орехом", category: "Закуски", price: 495, weight: "160 гр", isVegan: true, emoji: "🍆", desc: "Рулетики из баклажана с ореховой начинкой в соусе Ромеско" },
    { id: 11, name: "Рулетики из перца", category: "Закуски", price: 495, weight: "160 гр", isVegan: false, emoji: "🫑", desc: "С творожно-ореховой начинкой" },
    { id: 12, name: "Ассорти грузинских закусок", category: "Закуски", price: 590, weight: "300 гр", isVegan: false, emoji: "🍽️", desc: "Лобио, баклажанная икра, пхали и сациви — лучшее сразу" },
    { id: 13, name: "Свежие овощи", category: "Закуски", price: 490, weight: "290 гр", isVegan: true, emoji: "🥦", desc: "Сезонные свежие овощи" },
    { id: 14, name: "Грузинские разносолы", category: "Закуски", price: 550, weight: "300 гр", isVegan: true, emoji: "🥒", desc: "Фирменные маринованные и квашеные овощи по грузинским рецептам" },
    { id: 15, name: "Цезаридзе с цыплёнком", category: "Салаты", price: 590, weight: "290 гр", isVegan: false, emoji: "🥗", desc: "Грузинский взгляд на классический Цезарь" },
    { id: 16, name: "Салат с карамелизированными баклажанами", category: "Салаты", price: 570, weight: "230 гр", isVegan: true, emoji: "🍆", desc: "Оригинальный фирменный салат" },
    { id: 17, name: "Большой овощной салат", category: "Салаты", price: 470, weight: "320 гр", isVegan: true, emoji: "🥗", desc: "Со сванской солью и кахетинским маслом" },
    { id: 18, name: "Харчо", category: "Супы", price: 450, weight: "300 гр", isVegan: false, emoji: "🍲", desc: "Пряный говяжий суп с рисом и грецким орехом" },
    { id: 19, name: "Тыквенный крем-суп", category: "Супы", price: 370, weight: "300 гр", isVegan: true, emoji: "🎃", desc: "Нежный и согревающий" },
    { id: 20, name: "Дюшбара", category: "Супы", price: 350, weight: "370 гр", isVegan: false, emoji: "🍜", desc: "Мини-хинкали с говядиной в курином бульоне" },
    { id: 21, name: "Чакапули", category: "Горячее", price: 880, weight: "350 гр", isVegan: false, emoji: "🍖", desc: "Томлёная в вине говядина с тархуном и сливой" },
    { id: 22, name: "Чкмерули", category: "Горячее", price: 650, weight: "300 гр", isVegan: false, emoji: "🍗", desc: "Цыплёнок в сливках с картофельным пюре" },
    { id: 23, name: "Чахохбили", category: "Горячее", price: 570, weight: "300 гр", isVegan: false, emoji: "🍗", desc: "Цыплёнок в томатном соусе — даже детям подходит!" },
    { id: 24, name: "Оджахури со свининой", category: "Горячее", price: 670, weight: "300 гр", isVegan: false, emoji: "🥩", desc: "Жареная свинина с картофелем и овощами" },
    { id: 25, name: "Кобулети", category: "Горячее", price: 795, weight: "230 гр", isVegan: false, emoji: "🍄", desc: "Запечённые с сыром грибы на картофельном пюре" },
    { id: 26, name: "Шашлык из курицы", category: "Гриль", price: 490, weight: "170/80/40 гр", isVegan: false, emoji: "🍢", desc: "Сочный шашлык на углях с маринадом" },
    { id: 27, name: "Шашлык из свинины", category: "Гриль", price: 630, weight: "170/80/40 гр", isVegan: false, emoji: "🍢", desc: "Классика мангала с домашним маринадом" },
    { id: 28, name: "Шашлык из барашка", category: "Гриль", price: 990, weight: "160/80/40 гр", isVegan: false, emoji: "🍢", desc: "Нежная баранина с дымком" },
    { id: 29, name: "Шампиньоны на гриле", category: "Гриль", price: 350, weight: "170 гр", isVegan: true, emoji: "🍄", desc: "Ароматные грибы, приготовленные на живом огне" },
    { id: 30, name: "Овощи на гриле", category: "Гриль", price: 350, weight: "190 гр", isVegan: true, emoji: "🌽", desc: "Сезонные овощи с дымком" },
    { id: 31, name: "Медовик", category: "Десерты", price: 390, weight: "170 гр", isVegan: false, emoji: "🍰", desc: "С рикоттой из собственной сыроварни" },
    { id: 32, name: "Ягодный тарт", category: "Десерты", price: 490, weight: "150 гр", isVegan: false, emoji: "🍓", desc: "Вкуснейший тарт с ягодами" },
    { id: 33, name: "Брауни Эрл Грей", category: "Десерты", price: 440, weight: "125 гр", isVegan: true, emoji: "🍫", desc: "Без глютена! С ароматом чая Эрл Грей" },
    { id: 34, name: "Пончики по-тбилисски", category: "Десерты", price: 390, weight: "170 гр", isVegan: false, emoji: "🍩", desc: "Нежные тбилисские пончики" },
    { id: 35, name: "Ореховый торт", category: "Десерты", price: 440, weight: "180 гр", isVegan: false, emoji: "🎂", desc: "Все десерты мы делаем сами!" }
  ];

  let activeCategory = "Все";
  let searchQuery = "";

  function getCategories() {
    const unique = [...new Set(dishes.map(d => d.category))];
    return ["Все", ...unique];
  }

  function renderCategories() {
    const container = document.getElementById("categoryButtons");
    const categories = getCategories();
    container.innerHTML = "";

    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
      btn.textContent = cat;
      btn.addEventListener("click", () => {
        activeCategory = cat;
        renderCategories();
        applyFilters();
      });
      container.appendChild(btn);
    });
  }

  function applyFilters() {
    searchQuery = document.getElementById("searchInput").value.toLowerCase();
    const veganOnly = document.getElementById("veganOnly").checked;

    const filtered = dishes.filter(dish => {
      const matchCat = activeCategory === "Все" || dish.category === activeCategory;
      const matchSearch = dish.name.toLowerCase().includes(searchQuery) ||
                          dish.desc.toLowerCase().includes(searchQuery);
      const matchVegan = !veganOnly || dish.isVegan;
      return matchCat && matchSearch && matchVegan;
    });

    renderCards(filtered);
  }

  function renderCards(list) {
    const grid = document.getElementById("menuGrid");
    const info = document.getElementById("resultsInfo");
    info.textContent = `Показано блюд: ${list.length}`;
    grid.innerHTML = "";

    if (list.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🍽️</div>
          <p>Ничего не найдено. Попробуй другой запрос!</p>
        </div>
      `;
      return;
    }

    list.forEach(dish => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-img">${dish.emoji}</div>
        <div class="card-body">
          <span class="card-cat">${dish.category}</span>
          <div class="card-title-row">
            <span class="card-name">${dish.name}</span>
            ${dish.isVegan ? '<span class="badge-vegan">🌿 Веган</span>' : ''}
          </div>
          <p class="card-desc">${dish.desc}</p>
          <div class="card-footer">
            <span class="card-weight">${dish.weight}</span>
            <span class="card-price">${dish.price} ₽</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  renderCategories();
  applyFilters();
</script>
</body>
</html>
