<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Персонажи — Меню</title>

  <!-- Подключаем шрифты Google Fonts (единственная внешняя зависимость) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS-переменные — меняй цвета здесь, и всё обновится сразу
       ============================================================ */
    :root {
      --bg:        #fdf6ee;
      --card-bg:   #ffffff;
      --accent:    #c0392b;
      --accent2:   #e67e22;
      --text:      #2c2c2c;
      --muted:     #888;
      --border:    #e8ddd0;
      --hit:       #e74c3c;
      --radius:    14px;
      --shadow:    0 4px 18px rgba(0,0,0,0.08);
    }

    /* ============================================================
       Общий сброс и базовые стили
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       Шапка
       ============================================================ */
    header {
      background: var(--accent);
      color: #fff;
      padding: 24px 20px 20px;
      text-align: center;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
    }
    header p {
      margin-top: 6px;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    /* ============================================================
       Панель поиска и фильтров
       ============================================================ */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 0 16px;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 1rem;
      padding: 10px 0;
      background: transparent;
      color: var(--text);
    }
    .search-box .icon { color: var(--muted); font-size: 1.1rem; }

    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }

    .cat-btn {
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .cat-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .cat-btn:hover:not(.active) {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .results-info {
      padding: 10px 20px 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ============================================================
       Сетка карточек блюд
       ============================================================ */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      padding: 16px 20px 40px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s;
      animation: fadeIn 0.3s ease both;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      width: 100%;
      height: 180px;
      background: #f0e8df;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      flex-shrink: 0;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.35;
      flex: 1;
    }

    .badge-hit {
      background: var(--hit);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 2px;
    }

    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.45;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .card-weight {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .card-price {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .card-cat {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent2);
      background: #fef3e2;
      border-radius: 6px;
      padding: 2px 8px;
      align-self: flex-start;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state .emoji { font-size: 3rem; }
    .empty-state p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Персонажи</h1>
  <p>Кухня родом из Грузии · Волгоград</p>
</header>

<div class="controls">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск блюда..." oninput="applyFilters()" />
  </div>
  <div class="categories" id="categoryButtons"></div>
</div>

<div class="results-info" id="resultsInfo"></div>

<main class="menu-grid" id="menuGrid"></main>

    { id: 5, name: "Кубдари с говядиной", category: "Выпечка", price: 690, weight: "450 гр", isHit: false, emoji: "🥩", desc: "Традиционный сванский пирог с сочной начинкой из говядины" },

    { id: 12, name: "Хинкали с лососем и шпинатом", category: "Хинкали", price: 225, weight: "1 шт", isHit: false, emoji: "🐟", desc: "Сочный лосось со шпинатом в тонком тесте" },
    { id: 13, name: "Жареный Сулугуни", category: "Закуски", price: 440, weight: "120/40 гр", isHit: true, emoji: "🧀", desc: "Золотистая корочка снаружи, тянущийся сыр внутри — с клюквенным ткемали" },
    { id: 14, name: "Бадриджани с грецким орехом", category: "Закуски", price: 495, weight: "160 гр", isHit: true, emoji: "🍆", desc: "Рулетики из баклажана с ореховой начинкой в соусе Ромеско" },
    { id: 15, name: "Рулетики из перца", category: "Закуски", price: 495, weight: "160 гр", isHit: true, emoji: "🫑", desc: "С творожно-ореховой начинкой. Возьми ассорти!" },
    { id: 16, name: "Ассорти грузинских закусок", category: "Закуски", price: 590, weight: "300 гр", isHit: false, emoji: "🍽️", desc: "Лобио, баклажанная икра, пхали и сациви — лучшее сразу" },

    { id: 19, name: "Цезаридзе с цыплёнком", category: "Салаты", price: 590, weight: "290 гр", isHit: false, emoji: "🥗", desc: "Грузинский взгляд на классический Цезарь" },
    { id: 20, name: "Цезаридзе с тигриными креветками", category: "Салаты", price: 830, weight: "280 гр", isHit: false, emoji: "🦐", desc: "С нежным сырным кремом и томатами в соусе чили" },
    { id: 21, name: "Салат с карамелизированными баклажанами", category: "Салаты", price: 570, weight: "230 гр", isHit: true, emoji: "🍆", desc: "Оригинальный фирменный салат" },
    { id: 22, name: "Большой овощной салат", category: "Салаты", price: 470, weight: "320 гр", isHit: false, emoji: "🥗", desc: "Со сванской солью и кахетинским маслом" },
    { id: 23, name: "Харчо", category: "Супы", price: 450, weight: "300 гр", isHit: false, emoji: "🍲", desc: "Пряный говяжий суп с рисом и грецким орехом" },
    { id: 24, name: "Хашлама", category: "Супы", price: 650, weight: "350 гр", isHit: false, emoji: "🥘", desc: "Горшочек с барашком и овощами под шапкой из теста" },
    { id: 25, name: "Дюшбара", category: "Супы", price: 350, weight: "370 гр", isHit: false, emoji: "🍜", desc: "Мини-хинкали с говядиной в курином бульоне" },

    { id: 28, name: "Чакапули", category: "Горячее", price: 880, weight: "350 гр", isHit: true, emoji: "🍖", desc: "Томлёная в вине говядина с тархуном и сливой" },
    { id: 29, name: "Чкмерули", category: "Горячее", price: 650, weight: "300 гр", isHit: false, emoji: "🍗", desc: "Цыплёнок в сливках с картофельным пюре" },
    { id: 30, name: "Чахохбили", category: "Горячее", price: 570, weight: "300 гр", isHit: true, emoji: "🍗", desc: "Цыплёнок в томатном соусе — даже детям подходит!" },
    { id: 31, name: "Оджахури со свининой", category: "Горячее", price: 670, weight: "300 гр", isHit: false, emoji: "🥩", desc: "Жареная свинина с картофелем и овощами" },
    { id: 32, name: "Кобулети", category: "Горячее", price: 795, weight: "230 гр", isHit: true, emoji: "🍄", desc: "Запечённые с сыром грибы на картофельном пюре" },
    { id: 33, name: "Котлета по-тбилисски", category: "Горячее", price: 490, weight: "260 гр", isHit: false, emoji: "🥩", desc: "С соусом из кукурузы" },
    { id: 34, name: "Шашлык из курицы", category: "Гриль", price: 490, weight: "170/80/40 гр", isHit: false, emoji: "🍢", desc: "Сочный шашлык на углях с маринадом" },
    { id: 35, name: "Шашлык из свинины", category: "Гриль", price: 630, weight: "170/80/40 гр", isHit: false, emoji: "🍢", desc: "Классика мангала с домашним маринадом" },
    { id: 36, name: "Шашлык из барашка", category: "Гриль", price: 990, weight: "160/80/40 гр", isHit: false, emoji: "🍢", desc: "Нежная баранина с дымком" },
    { id: 37, name: "Гриль-сет на компанию", category: "Гриль", price: 3790, weight: "1350/120 гр", isHit: false, emoji: "🎉", desc: "Шашлык из свинины, курицы, люля из баранины и говядины, шампиньоны, картофель и три соуса" },
    { id: 38, name: "Медовик", category: "Десерты", price: 390, weight: "170 гр", isHit: true, emoji: "🍰", desc: "С рикоттой из собственной сыроварни" },
    { id: 39, name: "Ягодный тарт", category: "Десерты", price: 490, weight: "150 гр", isHit: true, emoji: "🍓", desc: "Вкуснейший тарт с ягодами" },
    { id: 40, name: "Орешки со сгущёнкой", category: "Десерты", price: 350, weight: "185 гр", isHit: true, emoji: "🥜", desc: "Сладости твоего детства! Зумер, попробуй что ели твои предки" },
    { id: 41, name: "Пончики по-тбилисски", category: "Десерты", price: 390, weight: "170 гр", isHit: false, emoji: "🍩", desc: "Нежные тбилисские пончики" },
    { id: 42, name: "Брауни Эрл Грей", category: "Десерты", price: 440, weight: "125 гр", isHit: false, emoji: "🍫", desc: "Без глютена! С ароматом чая Эрл Грей" },
    { id: 43, name: "Ореховый торт", category: "Десерты", price: 440, weight: "180 гр", isHit: true, emoji: "🎂", desc: "Все десерты мы делаем сами!" }
  ];

  let activeCategory = "Все";
  let searchQuery = "";

  function getCategories() {
    const unique = [...new Set(dishes.map(d => d.category))];
    return ["Все", ...unique];
  }

  function renderCategories() {
    const container = document.getElementById("categoryButtons");
    const categories = getCategories();
    container.innerHTML = "";

    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
      btn.textContent = cat;
      btn.addEventListener("click", () => {
        activeCategory = cat;
        renderCategories();
        applyFilters();
      });
      container.appendChild(btn);
    });
  }

  function applyFilters() {
    searchQuery = document.getElementById("searchInput").value.toLowerCase();
    const filtered = dishes.filter(dish => {
      const matchCat = activeCategory === "Все" || dish.category === activeCategory;
      const matchSearch = dish.name.toLowerCase().includes(searchQuery) ||
                          dish.desc.toLowerCase().includes(searchQuery);
      return matchCat && matchSearch;
    });
    renderCards(filtered);
  }

  function renderCards(list) {
    const grid = document.getElementById("menuGrid");
    const info = document.getElementById("resultsInfo");
    info.textContent = `Показано блюд: ${list.length}`;
    grid.innerHTML = "";

    if (list.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🍽️</div>
          <p>Ничего не найдено. Попробуй другой запрос!</p>
        </div>
      `;
      return;
    }

    list.forEach(dish => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-img">${dish.emoji}</div>
        <div class="card-body">
          <span class="card-cat">${dish.category}</span>
          <div class="card-title-row">
            <span class="card-name">${dish.name}</span>
            ${dish.isHit ? '<span class="badge-hit">ХИТ</span>' : ''}
          </div>
          <p class="card-desc">${dish.desc}</p>
          <div class="card-footer">
            <span class="card-weight">${dish.weight}</span>
            <span class="card-price">${dish.price} ₽</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  renderCategories();
  applyFilters();
</script>
</body>
</html>
